<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salt Flats Racer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky:    #3db4f0;
      --sand:   #d4843a;
      --red:    #d4202a;
      --white:  #f5f5f5;
      --dark:   #1a1108;
      --panel:  rgba(26, 17, 8, 0.72);
    }

    html, body {
      height: 100%;
      background: var(--dark);
      font-family: 'Inter', sans-serif;
      color: var(--white);
      overflow: hidden;
    }

    /* ── full-bleed image layer ── */
    #scene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #scene img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: saturate(1.15);
    }

    /* ── dust-streak animation overlay ── */
    #scene::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        100deg,
        transparent 0%,
        transparent 48%,
        rgba(212, 132, 58, 0.06) 50%,
        transparent 52%
      );
      animation: dustMove 3s linear infinite;
      pointer-events: none;
    }
    @keyframes dustMove {
      from { background-position: 0 0; }
      to   { background-position: 200px 0; }
    }

    /* ── HUD panel at bottom ── */
    #hud {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 24px 18px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      border-top: 2px solid var(--sand);
    }

    /* number badge */
    #badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      line-height: 1;
      color: var(--red);
      text-shadow: 0 0 18px rgba(212,32,42,0.6);
      min-width: 52px;
      text-align: center;
    }

    /* audio player */
    #hud audio {
      flex: 1;
      min-width: 0;
      height: 36px;
      border-radius: 18px;
      accent-color: var(--red);
    }

    /* override webkit audio styles */
    audio::-webkit-media-controls-panel {
      background: rgba(26,17,8,0.85);
    }

    /* buttons */
    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border: 2px solid var(--sand);
      border-radius: 6px;
      background: transparent;
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:hover {
      background: var(--sand);
      color: var(--dark);
    }
    .btn:active { transform: scale(0.96); }

    .btn.primary {
      border-color: var(--red);
      color: var(--red);
    }
    .btn.primary:hover {
      background: var(--red);
      color: var(--white);
    }

    /* speed lines on load */
    @keyframes slideUp {
      from { transform: translateY(80px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    #hud { animation: slideUp 0.5s cubic-bezier(.22,.68,0,1.2) both; }

    /* title badge top-left */
    #title {
      position: fixed;
      top: 18px;
      left: 22px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.12em;
      color: var(--white);
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
      pointer-events: none;
    }
    #title span { color: var(--red); }
  </style>
</head>
<body>

  <div id="title">SALT FLATS <span>RACER</span></div>

  <!-- image -->
  <div id="scene">
    <img id="hero" src="1781635579772.png" alt="Salt Flats Racer cartoon illustration" />
  </div>

  <!-- bottom HUD -->
  <div id="hud">
    <div id="badge">5</div>

    <audio id="track" controls autoplay loop>
      <source src="Page1_Salt_Flats.mp3" type="audio/mpeg" />
      Your browser does not support audio.
    </audio>

    <button class="btn primary" onclick="goNext()">
      NEXT &rarr;
    </button>

    <button class="btn" onclick="location.reload()">
      &#x21bb; RESTART
    </button>
  </div>

  <script>
    // NEXT button — replace with your actual next-page URL or logic
    function goNext() {
      // stub: alert for now; swap in your navigation target
      alert('Next page coming soon — swap this handler with your target URL or function.');
    }

    // Auto-play audio (browsers may block until user interaction)
    const audio = document.getElementById('track');
    document.body.addEventListener('click', () => {
      if (audio.paused) audio.play();
    }, { once: true });
  </script>

</body>
</html>
